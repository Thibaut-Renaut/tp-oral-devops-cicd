name: Pipeline CICD projet Master

on:
  push:
    branches:
      - main

env:
  BACK_IMAGE_NAME: backendapp
  FRONT_IMAGE_NAME: frontendapp
  REPO: ghcr.io

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer les dépendances du backend
        working-directory: ./backend
        run: npm install

      - name: Lancer les tests backend (Jest)
        working-directory: ./backend
        run: npm test

      - name: Lancer les tests frontend (Vérification des fichiers)
        working-directory: ./frontend
        run: ls -lah

  build:
    needs: test
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image back
        run: docker build -t ${{env.BACK_IMAGE_NAME}} ./backend

      - name: Build image front
        run: docker build -t ${{env.FRONT_IMAGE_NAME}} ./frontend

      - name: Run images locales
        run: |
          docker run -d -p 3000:3000 ${{env.BACK_IMAGE_NAME}}
          docker run -d -p 8080:80 ${{env.FRONT_IMAGE_NAME}}

      - name: Tager en version courante
        run: |
          docker tag ${{env.BACK_IMAGE_NAME}} ${{env.REPO}}/thibaut-renaut/${{env.BACK_IMAGE_NAME}}:1.0
          docker tag ${{env.FRONT_IMAGE_NAME}} ${{env.REPO}}/thibaut-renaut/${{env.FRONT_IMAGE_NAME}}:1.0

      - name: Tager en version latest
        run: |
          docker tag ${{env.BACK_IMAGE_NAME}} ${{env.REPO}}/thibaut-renaut/${{env.BACK_IMAGE_NAME}}:latest
          docker tag ${{env.FRONT_IMAGE_NAME}} ${{env.REPO}}/thibaut-renaut/${{env.FRONT_IMAGE_NAME}}:latest

      - name: connexion a GHCR
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REPO }}
          username: thibaut-renaut
          password: ${{ secrets.TOKENCICD }}

      - name: Push de l'image V1.0
        run: |
          docker push ${{env.REPO}}/thibaut-renaut/${{env.BACK_IMAGE_NAME}}:1.0
          docker push ${{env.REPO}}/thibaut-renaut/${{env.FRONT_IMAGE_NAME}}:1.0

      - name: Push de l'image latest
        run: |
          docker push ${{env.REPO}}/thibaut-renaut/${{env.BACK_IMAGE_NAME}}:latest
          docker push ${{env.REPO}}/thibaut-renaut/${{env.FRONT_IMAGE_NAME}}:latest

  deploy:
    needs: build
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: connexion SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.KEY }}
          script: |
            echo ${{ secrets.TOKENCICD }} | docker login ghcr.io -u thibaut-renaut --password-stdin

            docker pull ${{env.REPO}}/thibaut-renaut/${{env.BACK_IMAGE_NAME}}:latest
            docker pull ${{env.REPO}}/thibaut-renaut/${{env.FRONT_IMAGE_NAME}}:latest

            # Suppression des anciens conteneurs pour libérer les ports
            docker rm -f ${{env.BACK_IMAGE_NAME}} ${{env.FRONT_IMAGE_NAME}} || true

            docker run -d -p 3000:3000 --name ${{env.BACK_IMAGE_NAME}} ${{env.REPO}}/thibaut-renaut/${{env.BACK_IMAGE_NAME}}:latest
            docker run -d -p 8080:80 --name ${{env.FRONT_IMAGE_NAME}} ${{env.REPO}}/thibaut-renaut/${{env.FRONT_IMAGE_NAME}}:latest

            # Vérification du démarrage
            curl localhost:3000
            curl localhost:8080
