<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App TP DevOps</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 50px;
      }
      .status {
        padding: 20px;
        background-color: #d4edda;
        color: #155724;
        border-radius: 5px;
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <h1>Bienvenue sur notre plateforme (TP DevOps)</h1>
    <div id="app" class="status">Chargement depuis le backend...</div>

    <script>
      // On interroge l'API du backend
      //fetch("http://localhost:3001/api/status")
      fetch("http://13.62.53.20:3001/api/status")
        .then((response) => response.json())
        .then((data) => {
          document.getElementById("app").innerText = data.message;
        })
        .catch((error) => {
          document.getElementById("app").innerText =
            "Erreur de connexion au backend.";
          document.getElementById("app").style.backgroundColor = "#f8d7da";
          document.getElementById("app").style.color = "#721c24";
        });
    </script>
  </body>
</html>
